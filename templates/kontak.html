{% extends 'base.html' %}

{% block title %}Kontak{% endblock %}

{% block content %}
<h1><img src="{{ url_for('static', filename='icons/tomat.png') }}" class="heading-icon" alt=""> Hubungi Saya</h1>

<form method="POST">
    <div class="form-group">
        <label for="name">Nama</label>
        <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
        <label for="message">Pesan</label>
        <textarea id="message" name="message" rows="5" required></textarea>
    </div>

    <button type="submit">Kirim Pesan</button>
</form>

<div class="info-box">
    <h3><img src="{{ url_for('static', filename='icons/kontak.png') }}" class="heading-icon" alt=""> Info Kontak</h3>
    <ul class="findme-list">
        <li>
    <img src="{{ url_for('static', filename='icons/email.png') }}" class="findme-icon" alt="Email">
    <a href="mailto:{{ profile.email }}">{{ profile.email if profile else '-' }}</a
    </li>       
     <li>
            <img src="{{ url_for('static', filename='icons/github.png') }}" class="findme-icon" alt="GitHub">
            <a href="{{ profile.github }}" target="_blank">{{ profile.github if profile else '-' }}</a>
        </li>
        <li>
            <img src="{{ url_for('static', filename='icons/linkedin.png') }}" class="findme-icon" alt="LinkedIn">
            <a href="{{ profile.linkedin }}" target="_blank">{{ profile.linkedin if profile else '-' }}</a>
        </li>
    </ul>
</div>
{% endblock %}
